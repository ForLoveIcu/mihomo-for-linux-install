name: Auto Update Binaries

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/update-binaries.yml'

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: List current files
      run: |
        echo "Current directory files:"
        ls -la
        echo "Mihomo files:"
        ls -la mihomo-* || echo "No mihomo files found"
        echo "Binaries directory:"
        ls -la binaries/ || echo "No binaries directory"

    - name: Get current versions
      id: current-version
      run: |
        echo "Detecting current versions..."
        if ls mihomo-linux-amd64-v1-v*.gz 1> /dev/null 2>&1; then
          current_mihomo=$(ls mihomo-linux-amd64-v1-v*.gz | head -1 | sed 's/.*-v1-\(v[^.]*\)\.gz/\1/')
          echo "Extracted version from filename: $current_mihomo"
        else
          current_mihomo="v1.19.12"
          echo "Using default version: $current_mihomo"
        fi
        echo "current_mihomo=$current_mihomo" >> $GITHUB_OUTPUT
        echo "Current Mihomo: $current_mihomo"

        current_webui="v1.188.1"
        echo "current_webui=$current_webui" >> $GITHUB_OUTPUT
        echo "Current WebUI: $current_webui"

    - name: Check latest Mihomo version
      id: latest-mihomo
      run: |
        echo "Getting latest Mihomo version..."
        latest=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r .tag_name)
        echo "latest_mihomo=$latest" >> $GITHUB_OUTPUT
        echo "Latest Mihomo: $latest"

    - name: Check latest WebUI version
      id: latest-webui
      run: |
        echo "Getting latest WebUI version..."
        latest=$(curl -s https://api.github.com/repos/MetaCubeX/metacubexd/releases/latest | jq -r .tag_name)
        echo "latest_webui=$latest" >> $GITHUB_OUTPUT
        echo "Latest WebUI: $latest"

    - name: Compare versions
      id: compare-versions
      run: |
        echo "Version comparison..."
        current_mihomo="${{ steps.current-version.outputs.current_mihomo }}"
        latest_mihomo="${{ steps.latest-mihomo.outputs.latest_mihomo }}"
        current_webui="${{ steps.current-version.outputs.current_webui }}"
        latest_webui="${{ steps.latest-webui.outputs.latest_webui }}"

        echo "Current Mihomo: $current_mihomo"
        echo "Latest Mihomo: $latest_mihomo"
        echo "Current WebUI: $current_webui"
        echo "Latest WebUI: $latest_webui"

        if [ "$current_mihomo" != "$latest_mihomo" ]; then
          echo "Mihomo needs update: $current_mihomo -> $latest_mihomo"
          echo "mihomo_needs_update=true" >> $GITHUB_OUTPUT
        else
          echo "Mihomo is up to date: $current_mihomo"
          echo "mihomo_needs_update=false" >> $GITHUB_OUTPUT
        fi

        if [ "$current_webui" != "$latest_webui" ]; then
          echo "WebUI needs update: $current_webui -> $latest_webui"
          echo "webui_needs_update=true" >> $GITHUB_OUTPUT
        else
          echo "WebUI is up to date: $current_webui"
          echo "webui_needs_update=false" >> $GITHUB_OUTPUT
        fi

        echo "current_mihomo_version=$current_mihomo" >> $GITHUB_OUTPUT
        echo "latest_mihomo_version=$latest_mihomo" >> $GITHUB_OUTPUT
        echo "current_webui_version=$current_webui" >> $GITHUB_OUTPUT
        echo "latest_webui_version=$latest_webui" >> $GITHUB_OUTPUT

    - name: Download updates
      if: steps.compare-versions.outputs.mihomo_needs_update == 'true' || steps.compare-versions.outputs.webui_needs_update == 'true'
      run: |
        echo "Starting download updates..."
        latest_mihomo="${{ steps.compare-versions.outputs.latest_mihomo_version }}"
        latest_webui="${{ steps.compare-versions.outputs.latest_webui_version }}"

        mkdir -p backup_$(date +%Y%m%d_%H%M%S)
        cp -r mihomo-linux-*.gz compressed-dist.tgz binaries/ backup_$(date +%Y%m%d_%H%M%S)/ 2>/dev/null || true

        if [ "${{ steps.compare-versions.outputs.mihomo_needs_update }}" = "true" ]; then
          echo "Downloading Mihomo $latest_mihomo..."

          rm -f mihomo-linux-*.gz binaries/mihomo-linux-*.gz
          mkdir -p binaries

          architectures=("amd64-v1" "arm64" "armv7")
          for arch in "${architectures[@]}"; do
            filename="mihomo-linux-${arch}-${latest_mihomo}.gz"
            url="https://github.com/MetaCubeX/mihomo/releases/download/${latest_mihomo}/${filename}"

            echo "Downloading $arch architecture..."
            if curl -L -o "binaries/$filename" "$url" --retry 3 --retry-delay 5; then
              cp "binaries/$filename" .
              echo "$arch download completed"
            else
              echo "$arch download failed"
            fi
          done
        fi

        if [ "${{ steps.compare-versions.outputs.webui_needs_update }}" = "true" ]; then
          echo "Downloading WebUI $latest_webui..."

          webui_url="https://github.com/MetaCubeX/metacubexd/releases/download/${latest_webui}/compressed-dist.tgz"
          if curl -L -o "binaries/metacubexd.tgz" "$webui_url" --retry 3 --retry-delay 5; then
            cp binaries/metacubexd.tgz compressed-dist.tgz
            echo "WebUI download completed"
          else
            echo "WebUI download failed"
          fi
        fi

        echo "Download completed"
        ls -la mihomo-linux-*.gz compressed-dist.tgz 2>/dev/null || true

    - name: Commit updates
      if: steps.compare-versions.outputs.mihomo_needs_update == 'true' || steps.compare-versions.outputs.webui_needs_update == 'true'
      run: |
        echo "Committing updates..."

        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        if git diff --quiet && git diff --cached --quiet; then
          echo "No file changes, skipping commit"
          exit 0
        fi

        git add .

        current_date=$(date '+%Y-%m-%d %H:%M:%S UTC')
        commit_msg="Auto update binaries"

        if [ "${{ steps.compare-versions.outputs.mihomo_needs_update }}" = "true" ]; then
          commit_msg="$commit_msg - Mihomo: ${{ steps.compare-versions.outputs.current_mihomo_version }} -> ${{ steps.compare-versions.outputs.latest_mihomo_version }}"
        fi

        if [ "${{ steps.compare-versions.outputs.webui_needs_update }}" = "true" ]; then
          commit_msg="$commit_msg - WebUI: ${{ steps.compare-versions.outputs.current_webui_version }} -> ${{ steps.compare-versions.outputs.latest_webui_version }}"
        fi

        commit_msg="$commit_msg - Auto updated by GitHub Actions at $current_date"

        git commit -m "$commit_msg"
        git push

        echo "Updates committed and pushed"

    - name: Summary
      run: |
        echo "Check completed"
        echo "Mihomo needs update: ${{ steps.compare-versions.outputs.mihomo_needs_update }}"
        echo "WebUI needs update: ${{ steps.compare-versions.outputs.webui_needs_update }}"
        echo "Current Mihomo: ${{ steps.compare-versions.outputs.current_mihomo_version }}"
        echo "Latest Mihomo: ${{ steps.compare-versions.outputs.latest_mihomo_version }}"
        echo "Current WebUI: ${{ steps.compare-versions.outputs.current_webui_version }}"
        echo "Latest WebUI: ${{ steps.compare-versions.outputs.latest_webui_version }}"

        if [ "${{ steps.compare-versions.outputs.mihomo_needs_update }}" = "true" ] || [ "${{ steps.compare-versions.outputs.webui_needs_update }}" = "true" ]; then
          echo "Auto update completed!"
        else
          echo "All components are up to date!"
        fi

